name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev

      - name: Set up Android SDK & NDK (includes AIDL)
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools (contains aidl)
        run: |
          sdkmanager "build-tools;34.0.0" \
                     "platforms;android-34" \
                     "ndk;25.2.9519653"

      - name: Add aidl to PATH
        run: |
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Verify aidl
        run: aidl --version

      - name: Install Buildozer & yt-dlp
        run: |
          pip install buildozer yt-dlp cython

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youtube-downloader-apk
          path: bin/*.apk
